name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pocketrail

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Over SSH
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check deploy secrets
        id: deploy-check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_SSH_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping SSH deploy because DEPLOY_HOST, DEPLOY_USER, or DEPLOY_SSH_KEY is missing."
          fi

      - name: Deploy container
        if: steps.deploy-check.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.2
        env:
          POCKETRAIL_IMAGE: ${{ env.IMAGE_NAME }}:latest
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          WALLET_ENCRYPTION_KEY: ${{ secrets.WALLET_ENCRYPTION_KEY }}
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          SEPOLIA_USDC_ADDRESS: ${{ secrets.SEPOLIA_USDC_ADDRESS }}
          SEPOLIA_USDC_DECIMALS: ${{ secrets.SEPOLIA_USDC_DECIMALS }}
          BANXA_PARTNER_NAME: ${{ secrets.BANXA_PARTNER_NAME }}
          BANXA_ENV: ${{ secrets.BANXA_ENV }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: POCKETRAIL_IMAGE,GHCR_USERNAME,GHCR_TOKEN,NEXT_PUBLIC_APP_URL,SESSION_SECRET,WALLET_ENCRYPTION_KEY,SEPOLIA_RPC_URL,ETHEREUM_RPC_URL,SEPOLIA_USDC_ADDRESS,SEPOLIA_USDC_DECIMALS,BANXA_PARTNER_NAME,BANXA_ENV
          script: |
            set -eu
            mkdir -p ~/pocketrail
            cd ~/pocketrail
            if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            cat > docker-compose.yml <<'COMPOSE'
            services:
              pocketrail:
                image: ${POCKETRAIL_IMAGE}
                container_name: pocketrail-app
                ports:
                  - "3002:3002"
                environment:
                  NODE_ENV: production
                  PORT: 3002
                  HOSTNAME: 0.0.0.0
                  NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3002}
                  SESSION_SECRET: ${SESSION_SECRET}
                  WALLET_ENCRYPTION_KEY: ${WALLET_ENCRYPTION_KEY}
                  SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL:-https://ethereum-sepolia.publicnode.com}
                  ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL:-https://ethereum.publicnode.com}
                  SEPOLIA_USDC_ADDRESS: ${SEPOLIA_USDC_ADDRESS:-0x1c7d4b196cb0c7b01d743Fbc6116a902379C7238}
                  SEPOLIA_USDC_DECIMALS: ${SEPOLIA_USDC_DECIMALS:-6}
                  BANXA_PARTNER_NAME: ${BANXA_PARTNER_NAME:-}
                  BANXA_ENV: ${BANXA_ENV:-sandbox}
                volumes:
                  - pocketrail-data:/app/data
                restart: unless-stopped

            volumes:
              pocketrail-data:
            COMPOSE
            docker compose pull
            docker compose up -d
            docker image prune -f
