name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Pull Server Repo And Restart Docker
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secrets
        id: deploy-check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_SSH_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy because DEPLOY_HOST, DEPLOY_USER, or DEPLOY_SSH_KEY is missing."
          fi

      - name: Deploy from server repo
        if: steps.deploy-check.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          WALLET_ENCRYPTION_KEY: ${{ secrets.WALLET_ENCRYPTION_KEY }}
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          SEPOLIA_USDC_ADDRESS: ${{ secrets.SEPOLIA_USDC_ADDRESS }}
          SEPOLIA_USDC_DECIMALS: ${{ secrets.SEPOLIA_USDC_DECIMALS }}
          BANXA_PARTNER_NAME: ${{ secrets.BANXA_PARTNER_NAME }}
          BANXA_ENV: ${{ secrets.BANXA_ENV }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_PATH,NEXT_PUBLIC_APP_URL,SESSION_SECRET,WALLET_ENCRYPTION_KEY,SEPOLIA_RPC_URL,ETHEREUM_RPC_URL,SEPOLIA_USDC_ADDRESS,SEPOLIA_USDC_DECIMALS,BANXA_PARTNER_NAME,BANXA_ENV,GITHUB_SHA
          script: |
            set -eu

            APP_DIR="${DEPLOY_PATH:-/home/vjam/web3hack}"
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Expected a git repo at $APP_DIR, but .git was not found."
              echo "Set the DEPLOY_PATH GitHub secret to the exact server repo path."
              exit 1
            fi
            cd "$APP_DIR"

            echo "Deploying repo at $APP_DIR"
            echo "Before deploy: $(git rev-parse --short HEAD)"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            echo "After deploy: $(git rev-parse --short HEAD)"
            echo "Expected GitHub commit: ${GITHUB_SHA:-unknown}"

            cat > .env <<EOF
            NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3003}
            SESSION_SECRET=${SESSION_SECRET}
            WALLET_ENCRYPTION_KEY=${WALLET_ENCRYPTION_KEY}
            SEPOLIA_RPC_URL=${SEPOLIA_RPC_URL:-https://ethereum-sepolia.publicnode.com}
            ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL:-https://ethereum.publicnode.com}
            SEPOLIA_USDC_ADDRESS=${SEPOLIA_USDC_ADDRESS:-0x1c7d4b196cb0c7b01d743Fbc6116a902379C7238}
            SEPOLIA_USDC_DECIMALS=${SEPOLIA_USDC_DECIMALS:-6}
            BANXA_PARTNER_NAME=${BANXA_PARTNER_NAME:-}
            BANXA_ENV=${BANXA_ENV:-sandbox}
            EOF

            docker compose build --no-cache pocketrail
            docker compose up -d --force-recreate pocketrail
            docker image prune -f
            docker ps --filter "name=pocketrail-app" --format "deployed {{.Image}} on {{.Ports}}"
